name: Deploy Next.js to GitHub Pages

on:
  push:
    branches: ["main"] # Altere para 'master' se a sua branch principal tiver esse nome

# Permissões necessárias para o GitHub Actions modificar o Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Evita que dois deploys rodem ao mesmo tempo e quebrem o site
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Configurar o GitHub Pages
        uses: actions/configure-pages@v5

      - name: Instalar dependências
        run: npm ci

      - name: Build do Next.js
        run: npm run build

      # Faz o upload da pasta "out" (que o output: 'export' gerou)
      - name: Upload do Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
